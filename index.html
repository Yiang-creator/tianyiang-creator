<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>副业成就系统 · 甜一昂的光芒副本</title>
  <style>
    :root {
      --bg: #060814;
      --bg-2: #0a1022;
      --panel: rgba(14, 18, 35, 0.72);
      --panel-strong: rgba(16, 21, 42, 0.9);
      --line: rgba(255,255,255,0.09);
      --line-soft: rgba(255,255,255,0.06);
      --text: #f7f3ff;
      --muted: #c9c0dd;
      --soft: #968cb5;
      --gold: #f6d79d;
      --gold-2: #ffd98c;
      --pink: #f3a9c9;
      --violet: #a68dff;
      --cyan: #8ae7ff;
      --mint: #97efcc;
      --danger: #ff8db4;
      --success: #8ff0c0;
      --shadow: 0 24px 70px rgba(0,0,0,.42);
      --radius: 26px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(145, 111, 255, .18), transparent 24%),
        radial-gradient(circle at 80% 0%, rgba(255, 181, 210, .12), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(105, 156, 255, .10), transparent 35%),
        linear-gradient(180deg, #04060f 0%, #09101f 45%, #050814 100%);
      overflow-x: hidden;
    }
    body::before, body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      background-image:
        radial-gradient(2px 2px at 8% 18%, rgba(255,255,255,.8), transparent),
        radial-gradient(1.5px 1.5px at 22% 76%, rgba(255,255,255,.55), transparent),
        radial-gradient(1.5px 1.5px at 48% 32%, rgba(255,255,255,.45), transparent),
        radial-gradient(2px 2px at 74% 24%, rgba(255,255,255,.5), transparent),
        radial-gradient(1.5px 1.5px at 90% 80%, rgba(255,255,255,.58), transparent),
        radial-gradient(1px 1px at 64% 58%, rgba(255,255,255,.3), transparent),
        radial-gradient(1px 1px at 38% 88%, rgba(255,255,255,.35), transparent);
      opacity: .9;
      animation: twinkle 8s linear infinite alternate;
    }
    body::after {
      background:
        linear-gradient(120deg, transparent 0%, transparent 46%, rgba(255,255,255,.34) 49%, rgba(255,229,188,.7) 50%, transparent 54%, transparent 100%);
      width: 42vw;
      height: 2px;
      left: -45vw;
      top: 12vh;
      transform: rotate(-12deg);
      animation: meteor 7.2s linear infinite;
      opacity: .9;
      box-shadow: 0 0 18px rgba(255,229,188,.45);
    }
    @keyframes twinkle { from { opacity:.68; } to { opacity:1; } }
    @keyframes meteor {
      0% { transform: translateX(0) translateY(0) rotate(-12deg); opacity:0; }
      8% { opacity: .95; }
      38% { opacity: .95; }
      60% { opacity: 0; }
      100% { transform: translateX(145vw) translateY(34vh) rotate(-12deg); opacity:0; }
    }
    @keyframes floatGlow { from { transform: translateY(0); } to { transform: translateY(-6px); } }
    @keyframes fillBar { from { width: 0; } }
    @keyframes popupIn {
      from { transform: translate(-50%, -40%) scale(.88); opacity: 0; }
      to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    @keyframes particleFly {
      from { transform: translate(0,0) scale(1); opacity: 1; }
      to { transform: translate(var(--x), var(--y)) scale(.35); opacity: 0; }
    }
    .app {
      width: min(1220px, calc(100vw - 26px));
      margin: 22px auto 42px;
      position: relative;
      z-index: 1;
    }
    .glass {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 32px;
      padding: 26px;
      background:
        radial-gradient(circle at 86% 18%, rgba(255,217,155,.16), transparent 20%),
        radial-gradient(circle at 18% 0%, rgba(166,141,255,.18), transparent 26%),
        linear-gradient(145deg, rgba(14,18,35,.94), rgba(13,18,39,.82));
    }
    .hero::before {
      content: "";
      position: absolute;
      right: -40px;
      top: -50px;
      width: 240px;
      height: 240px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(246,215,157,.18), transparent 68%);
      pointer-events: none;
      animation: floatGlow 4s ease-in-out infinite alternate;
    }
    .hero-top {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 18px;
      align-items: stretch;
    }
    .title-block {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .english-tag, .mini-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(246,215,157,.28);
      color: var(--gold);
      background: rgba(255,255,255,.04);
      letter-spacing: .16em;
      text-transform: uppercase;
      font-size: 12px;
    }
    h1,h2,h3,p { margin: 0; }
    .main-title { margin-top: 14px; font-size: clamp(34px, 5vw, 58px); letter-spacing: .02em; }
    .subtitle { margin-top: 12px; color: var(--muted); line-height: 1.8; max-width: 760px; font-size: 14px; }
    .state-badge {
      min-width: 245px;
      padding: 16px 18px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.08);
    }
    .state-badge .line1 { color: var(--muted); font-size: 12px; }
    .state-badge .line2 { margin-top: 7px; font-size: 30px; font-weight: 800; color: var(--gold); }
    .state-badge .line3 { margin-top: 6px; color: var(--muted); font-size: 13px; line-height: 1.6; }
    .hero-panels {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 1.12fr .88fr;
      gap: 16px;
      align-items: start;
    }
    .role-card, .narration-card, .tab-btn, .info-card, .section, .stage-card, .attr-card, .metric-card, .record-card, .consult-card {
      border-radius: 24px;
      padding: 18px;
    }
    .role-card {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 18px;
      align-items: center;
      position: relative;
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.025));
    }
    .role-avatar {
      width: 110px;
      height: 110px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      font-size: 48px;
      background: linear-gradient(145deg, rgba(246,215,157,.22), rgba(240,168,198,.12));
      border: 1px solid rgba(246,215,157,.28);
      box-shadow: inset 0 0 30px rgba(255,255,255,.06);
    }
    .small-label { color: var(--gold); font-size: 12px; letter-spacing: .14em; text-transform: uppercase; }
    .role-name { font-size: clamp(30px, 4vw, 40px); margin-top: 8px; }
    .level-line { margin-top: 8px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .level-pill, .title-pill, .badge-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
    }
    .role-desc { margin-top: 10px; color: var(--muted); line-height: 1.7; font-size: 14px; }
    .mini-stats { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
    .mini-stats .badge-pill { color: var(--muted); }
    .narration-card {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      align-self: stretch;
    }
    .narration-text { margin-top: 12px; color: var(--muted); line-height: 1.85; font-size: 14px; }
    .info-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .info-card { background: rgba(255,255,255,.045); }
    .info-card .k { font-size: 12px; color: var(--muted); }
    .info-card .v { margin-top: 10px; font-size: 28px; font-weight: 800; color: var(--gold); }
    .info-card .s { margin-top: 8px; color: var(--soft); font-size: 12px; line-height: 1.6; }
    .chapter-track {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 12px;
      align-items: stretch;
    }
    .section {
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .section-head h2 { font-size: 22px; }
    .section-desc { color: var(--muted); font-size: 13px; line-height: 1.7; margin-top: 6px; }
    .story-line { color: var(--muted); line-height: 1.8; font-size: 14px; }
    .progress-box { margin-top: 14px; }
    .progress-top { display: flex; justify-content: space-between; gap: 10px; font-size: 13px; color: var(--muted); }
    .progress { margin-top: 10px; height: 12px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,.08); }
    .progress > i {
      display: block;
      height: 100%;
      border-radius: inherit;
      width: var(--w, 0%);
      background: linear-gradient(90deg, var(--gold), var(--pink));
      box-shadow: 0 0 18px rgba(240,168,198,.34);
      animation: fillBar 1.1s ease both;
    }
    .tabs {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }
    .tab-btn {
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.045);
      color: var(--muted);
      cursor: pointer;
      text-align: left;
      transition: .22s ease;
    }
    .tab-btn:hover, .tab-btn.active {
      transform: translateY(-2px);
      border-color: rgba(246,215,157,.3);
      background: linear-gradient(135deg, rgba(246,215,157,.14), rgba(166,141,255,.12));
    }
    .tab-btn strong { display: block; color: var(--text); font-size: 15px; }
    .tab-btn span { display: block; margin-top: 5px; font-size: 12px; line-height: 1.55; }
    .tab-panel { display: none; margin-top: 20px; }
    .tab-panel.active { display: block; }
    .grid-2, .grid-3, .grid-4 { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: 1.06fr .94fr; }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .attr-title-row { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom: 14px; }
    .attr-grid { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .attr-card {
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.025));
      border: 1px solid var(--line-soft);
    }
    .attr-top { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
    .attr-name { font-size: 20px; font-weight: 700; margin-top: 4px; }
    .attr-icon { font-size: 24px; }
    .attr-value { text-align:right; }
    .attr-value .num { color: var(--gold); font-size: 32px; font-weight: 800; }
    .attr-value .rank { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .attr-copy { margin-top: 12px; color: var(--muted); line-height: 1.7; font-size: 13px; min-height: 66px; }
    .attr-bottom { margin-top: 10px; display:flex; justify-content:space-between; gap:12px; color: var(--soft); font-size: 11px; line-height: 1.6; }
    .record-list, .entry-list, .consult-list { display:grid; gap:12px; margin-top: 16px; }
    .record-card, .metric-card, .consult-card, .stage-card { background: linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.02)); border: 1px solid var(--line-soft); }
    .metric-grid { display:grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .metric-card .label { color: var(--muted); font-size: 12px; }
    .metric-card .num { margin-top: 8px; font-size: 28px; font-weight: 800; color: var(--gold); }
    .metric-card .sub { margin-top: 6px; color: var(--soft); font-size: 12px; line-height: 1.6; }
    .stage-wrap { display:grid; gap:14px; }
    .stage-card.locked { opacity: .76; border-style: dashed; }
    .stage-head { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .stage-head h3 { font-size: 22px; }
    .stage-head .meta { margin-top: 7px; color: var(--muted); font-size: 13px; line-height: 1.7; }
    .stage-badge { padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,.05); color: var(--gold); border: 1px solid rgba(255,255,255,.08); white-space: nowrap; font-size: 12px; }
    .task-list { margin-top: 14px; display:grid; gap: 10px; }
    .task-item {
      position: relative;
      display:grid;
      grid-template-columns: 22px 1fr auto;
      gap: 12px;
      align-items:flex-start;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      overflow: hidden;
    }
    .task-item.done { border-color: rgba(143,240,192,.25); background: linear-gradient(135deg, rgba(143,240,192,.08), rgba(255,255,255,.03)); }
    .task-item input { margin-top: 3px; width: 18px; height: 18px; accent-color: #ffbfd4; }
    .task-item strong { display:block; font-size:15px; }
    .task-item span { display:block; margin-top:6px; color: var(--muted); font-size:12px; line-height:1.7; }
    .task-reward { color: var(--gold); font-size:12px; white-space: nowrap; }
    .form { display:grid; gap:12px; }
    .row-2 { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:12px; }
    input, textarea, select {
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(8, 11, 25, .72);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      outline: none;
    }
    input::placeholder, textarea::placeholder { color: #8d84aa; }
    textarea { min-height: 98px; resize: vertical; }
    .btn-row { display:flex; gap:10px; flex-wrap:wrap; }
    button.action, button.ghost {
      border-radius: 16px;
      padding: 12px 16px;
      font: inherit;
      cursor: pointer;
    }
    button.action {
      border: none;
      color: #0c1022;
      font-weight: 800;
      background: linear-gradient(135deg, var(--gold), var(--pink));
    }
    button.ghost {
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: var(--text);
    }
    .entry {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
    }
    .entry .top { display:flex; justify-content:space-between; gap:12px; }
    .entry .top strong { font-size:15px; }
    .entry .type { font-size: 12px; color: var(--gold); }
    .entry p { margin-top: 8px; color: var(--muted); font-size: 13px; line-height: 1.75; white-space: pre-wrap; }
    .footer-note { margin-top: 12px; color: var(--soft); font-size: 12px; line-height: 1.7; }
    .empty { padding: 22px; text-align:center; color: var(--soft); border: 1px dashed rgba(255,255,255,.1); border-radius: 18px; }
    .chart-box { height: 240px; display:flex; align-items:flex-end; gap:10px; margin-top: 14px; }
    .bar { flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; }
    .bar i {
      width:100%;
      min-height: 24px;
      height: var(--h, 30px);
      border-radius: 14px 14px 6px 6px;
      background: linear-gradient(180deg, rgba(246,215,157,.96), rgba(240,168,198,.72));
      box-shadow: 0 10px 24px rgba(240,168,198,.18);
      animation: fillBar .9s ease both;
    }
    .bar span { color: var(--muted); font-size: 12px; }
    .rank-badge { color: var(--gold); }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(2,5,14,.62);
      z-index: 10;
      display: none;
      backdrop-filter: blur(6px);
    }
    .overlay.show { display:block; }
    .popup {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(420px, calc(100vw - 26px));
      z-index: 11;
      display: none;
      padding: 24px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(16,21,42,.97), rgba(10,15,30,.92));
      border: 1px solid rgba(246,215,157,.26);
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
      text-align: center;
      animation: popupIn .28s ease both;
    }
    .popup.show { display:block; }
    .popup .icon { font-size: 44px; }
    .popup h3 { margin-top: 10px; font-size: 28px; }
    .popup p { margin-top: 10px; color: var(--muted); line-height: 1.8; font-size: 14px; }
    .popup .action { margin-top: 16px; }
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      left: 50%; top: 50%;
      width: 8px; height: 8px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,.9), rgba(246,215,157,.8));
      box-shadow: 0 0 14px rgba(246,215,157,.6);
      animation: particleFly .75s ease-out forwards;
    }
    .accent { color: var(--gold); }
    @media (max-width: 1024px) {
      .hero-top, .hero-panels, .chapter-track, .grid-2, .grid-4, .metric-grid, .tabs, .row-2 { grid-template-columns: 1fr; }
      .info-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 720px) {
      .app { width: min(100vw - 16px, 100%); margin: 10px auto 24px; }
      .hero { padding: 18px; border-radius: 24px; }
      .main-title { font-size: 34px; }
      .role-card { grid-template-columns: 1fr; }
      .role-avatar { width: 90px; height: 90px; }
      .info-grid, .attr-grid, .grid-3 { grid-template-columns: 1fr; }
      .task-item { grid-template-columns: 22px 1fr; }
      .task-reward { grid-column: 2 / 3; }
    }
  </style>
</head>
<body>
  <div class="app" id="app"></div>
  <div class="overlay" id="overlay"></div>
  <div class="popup" id="popup">
    <div class="icon">🏆</div>
    <h3 id="popupTitle">称号解锁</h3>
    <p id="popupBody"></p>
    <button class="action" id="popupBtn">继续推进主线</button>
  </div>
  <script>
    const STORAGE_KEY = 'side-hustle-route-v2-starry';
    const DAY_MS = 24 * 60 * 60 * 1000;
    const TODAY = new Date('2026-05-25T17:11:00+08:00');
    const weekLabels = ['周一','周二','周三','周四','周五','周六','周日'];

    const mainStageSeeds = [
      {
        key: 'stage1',
        icon: '🌱',
        title: '启程',
        narrative: '这是最轻的起步章节，不拼完美，只要把“我终于开始了”这一步真的走出去。',
        titleReward: '星尘见习生',
        tasks: [
          { id: 'm1', text: '先把手机内存腾出来，给这条副本留出拍摄空间。', reward: '创作力 +6 / 气场值 +2', type: 'creative' },
          { id: 'm2', text: '把飞机上整理的那批选题，老老实实存进素材库，别再让灵感失踪。', reward: '创作力 +8', type: 'creative' },
          { id: 'm3', text: '把“旅行的成本”这条口播录出来，哪怕先录出第一版。', reward: '创作力 +10 / 影响力 +4', type: 'creative' },
          { id: 'm4', text: '写下你的账号开场白：这一次，你到底想成为什么样的表达者？', reward: '气场值 +4 / 影响力 +2', type: 'creative' }
        ]
      },
      {
        key: 'stage2',
        icon: '🪐',
        title: '积累',
        narrative: '从零散爆发，走向持续更新。这个章节考验的不是灵感，而是你愿不愿意一次次把光亮点起来。',
        titleReward: '星轨记录者',
        tasks: [
          { id: 'm5', text: '完成一周 1-2 条口播更新，让账号开始形成自己的节奏。', reward: '创作力 +10 / 影响力 +4', type: 'creative' },
          { id: 'm6', text: '把一条内容从选题、文案到发布完整走完一次，留下一套可复用流程。', reward: '创作力 +8 / 气场值 +4', type: 'creative' },
          { id: 'm7', text: '观察并记录一条数据反馈：哪类表达最容易让人停下来听你说完。', reward: '影响力 +6 / 气场值 +2', type: 'creative' }
        ]
      },
      {
        key: 'stage3',

      if (!state.mainStages) state.mainStages = base.mainStages;

        const gap = rank.next ? rank.next - value : 0;
        return `
          <article class="attr-card glass">
            <div class="attr-top">
              <div>
                <div class="attr-icon">${item.icon}</div>
                <div class="attr-name">${item.name}</div>

            </div>

            <div class="progress"><i style="--w:${clamp(value, 0, 100)}%"></i></div>
            <div class="attr-bottom"><span>阶段门槛：0-30 新星 / 31-60 升起 / 61-100 耀眼 / 100+ 封神</span><span>${rank.next ? `距离下一评级还差 ${gap} 点` : '当前已是最高评级'}</span></div>

    function consultHTML() {
      const visible = getVisibleStages(state.consultStages);
      const records = state.consult.records.map(item => `<div class="entry"><div class="top"><strong>${item.title}</strong><span class="type">${item.type}</span></div><p>${item.body}</p><div class="footer-note">记录时间：${formatDate(item.createdAt)}</div></div>`).join('');
      return `
        <div class="grid-2">
          <section class="section glass">
            <div class="section-head"><div><div class="small-label">秘密据点</div><h2>咨询业务支线</h2><div class="section-desc">这条线专门负责留学/求职辅导接单，不再和内容创作主线混在一起。这里是服务体系、接单记录和月目标的阵地。</div></div></div>
            <div class="stage-wrap">${visible.map(stage => `
              <article class="consult-card glass ${stage.unlocked ? '' : 'locked'}">
                <div class="stage-head"><div><h3>${stage.icon} ${stage.title}</h3><div class="meta">${stage.narrative}</div></div><div class="stage-badge">${stage.unlocked ? `${stagePercent(stage)}%` : '待解锁'}</div></div>
                <div class="task-list">${stage.tasks.map(task => `
                  <label class="task-item ${task.checked ? 'done' : ''}">

            <div class="entry-list">${records || '<div class="empty">据点档案还很新，但这正说明它值得现在开始认真搭。</div>'}</div>
          </section>
        </div>
      `;

    function render() {
      const app = document.getElementById('app');
      const level = getLevelInfo();
      const current = currentMainStage();
      const titles = currentUnlockedTitles();
      const latestTitle = titles[titles.length - 1]?.name || '尚未解锁';
      const tabs = [
        { key: 'overview', title: '命运总览', desc: '角色卡、属性面板与章节推进' },
        { key: 'tasks', title: '主线章节', desc: '内容创作主线副本' },
        { key: 'workshop', title: '星途档案', desc: '灵感仓与章节旁白' },
        { key: 'consult', title: '秘密据点', desc: '咨询业务支线与经营记录' },
        { key: 'data', title: '星图回响', desc: '内容数据与成长反馈' }
      ];
      const active = state.activeTab;
      app.innerHTML = `
        <header class="hero glass">
          <div class="hero-top">
            <div>
              <div class="title-block">
                <div>
                  <div class="english-tag">SIDE HUSTLE ROUTE</div>
                  <h1 class="main-title">副业成就系统</h1>
                  <p class="subtitle">这不是一个普通待办清单，而是一段正在被认真经历的光芒副本。你会在这里看见内容主线、咨询支线、角色等级、称号解锁、属性成长，以及每一次真实推进留下的回声。</p>
                </div>
                <div class="state-badge glass">
                  <div class="line1">右上角角色状态</div>
                  <div class="line2">Lv.${level.level} ${level.name}</div>
                  <div class="line3">甜一昂（女王）<br/>当前最高属性评级：${highestRankName()}</div>
                </div>
              </div>
              <div class="hero-panels">
                <section class="role-card glass">
                  <div class="role-avatar">👑</div>
                  <div>
                    <div class="small-label">玩家角色</div>
                    <div class="role-name">甜一昂（女王）</div>
                    <div class="level-line">
                      <span class="level-pill">Lv.${level.level} ${level.name}</span>
                      <span class="title-pill">已解锁称号：${latestTitle}</span>
                    </div>
                    <div class="role-desc">你正在经历的，不只是“把副业做起来”，而是一条从表达、影响力到变现能力逐步成型的长线光芒之路。每一次推进，都会让这个角色更完整一点。</div>
                    <div class="mini-stats">
                      <span class="badge-pill">创作力 ${state.attributes.creativity}</span>
                      <span class="badge-pill">影响力 ${state.attributes.influence}</span>
                      <span class="badge-pill">变现力 ${state.attributes.monetization}</span>
                      <span class="badge-pill">气场值 ${state.attributes.aura}</span>
                    </div>
                  </div>
                </section>
                <section class="narration-card glass">
                  <div>
                    <div class="small-label">章节旁白</div>
                    <p class="narration-text">这一章的名字，叫做“认真开始之后，命运也会给你回音”。内容主线负责把你的声音送出去，秘密据点负责把能力变成承接与成交。你不是在机械打卡，而是在一页页写出属于自己的传奇版本。</p>
                  </div>
                  <div style="padding: 12px 0; border-top: 1px solid var(--line-soft);">
                    <div class="small-label" style="opacity: 0.6; font-size: 10px; margin-bottom: 8px;">副本即时同步</div>
                    <div style="display: grid; gap: 6px;">
                      <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 12px; color: var(--muted);">副本进度</span>
                        <span style="font-size: 12px; color: var(--gold); font-weight: 600;">${stagePercent(current)}%</span>
                      </div>
                      <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 12px; color: var(--muted);">激励提示</span>
                        <span style="font-size: 12px; color: var(--pink);">光芒在前方，女王请继续</span>
                      </div>
                      <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 12px; color: var(--muted);">目标预告</span>
                        <span style="font-size: 12px; color: var(--violet);">回声引路人</span>
                      </div>
                    </div>
                  </div>
                  <div class="footer-note" style="margin-top: 0;">下一段剧情提示：先把最轻的起步任务做掉，副本的第一道门才会真正打开。</div>
                </section>
              </div>
              <div class="info-grid">
                <div class="info-card glass"><div class="k">总进度</div><div class="v">${completedTaskCount()} / ${totalTasks()}</div><div class="s">所有主线与支线任务合计</div></div>
                <div class="info-card glass"><div class="k">当前主线</div><div class="v" style="font-size:24px">${current.icon} ${current.title}</div><div class="s">${current.narrative}</div></div>
                <div class="info-card glass"><div class="k">成就积分</div><div class="v">${scorePoints()}</div><div class="s">每完成 1 个任务 +25 点</div></div>
                <div class="info-card glass"><div class="k">已解锁称号</div><div class="v">${titles.length}</div><div class="s">最新称号：${latestTitle}</div></div>
              </div>
              <div class="chapter-track">
                <section class="section glass">
                  <div class="section-head"><div><div class="small-label">章节推进度</div><h2>${current.icon} ${current.title}</h2><div class="section-desc">${current.narrative}</div></div><div class="badge-pill">${stagePercent(current)}%</div></div>
                  <div class="progress"><i style="--w:${stagePercent(current)}%"></i></div>
                </section>
                <section class="section glass">
                  <div class="section-head"><div><div class="small-label">最高评级 badge</div><h2>当前最高属性评级：${highestRankName()}</h2><div class="section-desc">属性会随着任务、数据、咨询据点经营而波动提升。</div></div></div>
                </section>
              </div>
            </div>
          </div>
          <div class="tabs">${tabs.map(tab => `<button class="tab-btn glass ${tab.key === active ? 'active' : ''}" data-tab="${tab.key}"><strong>${tab.title}</strong><span>${tab.desc}</span></button>`).join('')}</div>
        </header>
        <main>
          <section class="tab-panel ${active === 'overview' ? 'active' : ''}">${mainOverviewHTML()}</section>
          <section class="tab-panel ${active === 'tasks' ? 'active' : ''}">${tasksHTML()}</section>
          <section class="tab-panel ${active === 'workshop' ? 'active' : ''}">${workshopHTML()}</section>
          <section class="tab-panel ${active === 'consult' ? 'active' : ''}">${consultHTML()}</section>
          <section class="tab-panel ${active === 'data' ? 'active' : ''}">${dataHTML()}</section>
        </main>
      `;
      bindEvents();
    }
    function bindEvents() {
      document.querySelectorAll('[data-tab]').forEach(btn => btn.onclick = () => { state.activeTab = btn.dataset.tab; commit(false); });
      document.querySelectorAll('.task-item input[type="checkbox"]').forEach(input => {
        input.onchange = () => handleTaskToggle(input.dataset.group, input.dataset.stage, input.dataset.task, input);
      });
      const ideaForm = document.getElementById('ideaForm');
      if (ideaForm) ideaForm.onsubmit = e => { e.preventDefault(); addIdea(ideaForm); };
      const diaryForm = document.getElementById('diaryForm');
      if (diaryForm) diaryForm.onsubmit = e => { e.preventDefault(); addDiary(diaryForm); };
      const metricForm = document.getElementById('metricForm');
      if (metricForm) metricForm.onsubmit = e => { e.preventDefault(); updateMetrics(metricForm); };
      const consultForm = document.getElementById('consultForm');
      if (consultForm) consultForm.onsubmit = e => { e.preventDefault(); updateConsult(consultForm); };
      const consultRecordForm = document.getElementById('consultRecordForm');
      if (consultRecordForm) consultRecordForm.onsubmit = e => { e.preventDefault(); addConsultRecord(consultRecordForm); };
      const resetBtn = document.getElementById('resetBtn');
      if (resetBtn) resetBtn.onclick = resetAll;
      const popupBtn = document.getElementById('popupBtn');
      const overlay = document.getElementById('overlay');
      popupBtn.onclick = closePopup;
      overlay.onclick = closePopup;
    }
    function commit(withPopup = true) {
      syncUnlocks(state, false);
      saveState();
      render();
      if (withPopup) consumePopup();
    }
    render();
    consumePopup();
  </script>
</body>
</html>
